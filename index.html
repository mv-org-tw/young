<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young | 元界創想與量元計畫創始人</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --主色調: #00d4ff;
            --次色調: #0081ff;
            --背景深: #050b18;
            --卡片背景: rgba(15, 23, 42, 0.85);
            --文字主色: #f8fafc;
            --文字淡色: #94a3b8;
        }

        /* 基礎設置與自動適配 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--背景深);
            color: var(--文字主色);
            line-height: 2;
            overflow-x: hidden;
            width: 100%;
        }

        /* 背景流光動畫 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* 首屏區塊 */
        .hero {
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(5, 11, 24, 0.75), rgba(5, 11, 24, 1)), 
                        url('https://i.meee.com.tw/kFuVCHM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .avatar-container {
            width: clamp(120px, 20vw, 180px);
            height: clamp(120px, 20vw, 180px);
            margin-bottom: 30px;
            position: relative;
            animation: heroFloat 4s ease-in-out infinite;
        }

        @keyframes heroFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--主色調);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: 0.5s;
        }

        .profile-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--主色調), var(--次色調), var(--主色調));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--文字淡色);
            letter-spacing: clamp(4px, 1vw, 8px);
            margin-bottom: 40px;
        }

        /* 滾動動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.17, 0.55, 0.55, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 0;
        }

        section {
            margin-bottom: 300px;
            width: 100%;
        }

        h2 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 60px;
            color: var(--主色調);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .glass-card {
            background: var(--卡片背景);
            padding: clamp(30px, 5vw, 60px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            transition: 0.4s ease;
        }

        p {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            margin-bottom: 35px;
            color: #e2e8f0;
            text-align: justify;
        }

        /* 社交媒體圖標網格 - 自動適配核心 */
        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap; /* 讓圖標在手機上自動換行 */
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .social-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            backdrop-filter: blur(8px);
        }

        /* 黑白兩色切換 Hover 效果 */
        .social-icon:hover {
            background: #ffffff; /* 變白底 */
            color: #000000;    /* 變黑圖標 */
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }

        .social-icon i {
            transition: transform 0.3s ease;
        }

        .btn-wrapper {
            margin-top: 50px;
            display: flex;
            justify-content: center;
        }

        .link-btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(45deg, var(--主色調), var(--次色調));
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 100px;
            transition: 0.5s;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            color: var(--文字淡色);
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            section { margin-bottom: 150px; }
            .social-icon { width: 48px; height: 48px; font-size: 1.2rem; }
            .social-links { gap: 12px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="avatar-container">
            <img src="https://i.meee.com.tw/jXmhwh3.png" alt="Young" class="avatar">
        </div>
        <h1 class="profile-title">Young</h1>
        <p class="subtitle">元界創想 · 量元計畫 創始人</p>
    </div>

    <div class="container">
        
        <section class="reveal">
            <h2>技術與實踐的融合</h2>
            <div class="glass-card">
                <p>我是十五歲的自主學習者，致力於在傳統體制之外，開闢一條屬於創造者的道路</p>
                <p>透過領導不同維度的組織，我將技術熱情轉化為系統性的協作流程，與夥伴共同探索虛擬世界的無限可能</p>
            </div>
        </section>

        <section class="reveal" style="text-align: center;">
            <div class="glass-card">
                <h2 style="justify-content: center;">連結未來</h2>
                <p>探索元界創想與量元計畫的數位足跡</p>
                
                <div class="social-links">
                    <a href="https://www.instagram.com/2010.young/" target="_blank" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="mailto:young@mvo.org.tw" class="social-icon" title="Email"><i class="fas fa-envelope"></i></a>
                    <a href="https://www.facebook.com/2010young" target="_blank" class="social-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.youtube.com/@2010young" target="_blank" class="social-icon" title="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="https://threads.net/@2010.young" target="_blank" class="social-icon" title="Threads"><i class="fab fa-threads"></i></a>
                    <a href="https://x.com/2010young" target="_blank" class="social-icon" title="X"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://www.tiktok.com/@2010young" target="_blank" class="social-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
                    <a href="https://wa.me/message/YOUR_ID" target="_blank" class="social-icon" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://discord.gg/mvo" target="_blank" class="social-icon" title="Discord"><i class="fab fa-discord"></i></a>
                    <a href="https://www.twitch.tv/2010young" target="_blank" class="social-icon" title="Twitch"><i class="fab fa-twitch"></i></a>
                    <a href="https://t.me/young2010" target="_blank" class="social-icon" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                    <a href="https://github.com/2010young" target="_blank" class="social-icon" title="GitHub"><i class="fab fa-github"></i></a>
                </div>

                <div class="btn-wrapper">
                    <a href="https://linktr.ee/2010young" target="_blank" class="link-btn">查看完整 Linktree</a>
                </div>
            </div>
        </section>

    </div>

    <footer>
        <p>YOUNG | 元界創想與量元計畫創始人</p>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.4;">二零二六 · 以勇氣與技術重新定義世界</p>
    </footer>

    <script>
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, observerOptions);
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
