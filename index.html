<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young | 連結未來</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --主色調: #00d4ff;
            --背景深: #050b18;
            --卡片背景: rgba(15, 23, 42, 0.9);
            --文字主色: #f8fafc;
            --圖標懸停背景: #ffffff;
            --圖標懸停色: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', sans-serif;
        }

        body {
            background-color: var(--背景深);
            color: var(--文字主色);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--卡片背景);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        h2 { font-size: 2.2rem; color: var(--主色調); margin-bottom: 20px; }
        p { margin-bottom: 35px; opacity: 0.8; line-height: 1.8; }

        /* 12 個圖標自動換行排版系統 */
        .social-grid {
            display: flex;
            flex-wrap: wrap; /* 核心：手機寬度不夠時自動換行 */
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        /* 官方黑白兩色切換效果 */
        .social-btn:hover {
            background: var(--圖標懸停背景);
            color: var(--圖標懸停色);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        @media (max-width: 480px) {
            .social-btn { width: 48px; height: 48px; font-size: 1.2rem; }
            .social-grid { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>連結未來</h2>
        <p>技術的探索不應止步於此，我期待與更多優秀的靈魂產生共鳴</p>

            <a href="mailto:young@mvo.org.tw" class="social-btn"><i class="fas fa-envelope"></i></a>
            <a href="https://www.facebook.com/2010young" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@2010young" target="_blank" class="social-btn"><i class="fab fa-youtube"></i></a>
            <a href="https://www.threads.net/@2010.young" target="_blank" class="social-btn"><i class="fab fa-threads"></i></a>
            <a href="https://x.com/2010young" target="_blank" class="social-btn"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.tiktok.com/@2010young" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/qr/G7Y6D6ALV5O4O1" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://discord.com/users/928643883652612147" target="_blank" class="social-btn"><i class="fab fa-discord"></i></a>
            <a href="https://www.twitch.tv/2010young" target="_blank" class="social-btn"><i class="fab fa-twitch"></i></a>
            <a href="https://t.me/young2010" target="_blank" class="social-btn"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://github.com/2010young" target="_blank" class="social-btn"><i class="fab fa-github"></i></a>
        </div>
    </div>

</body>
</html>
