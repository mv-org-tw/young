<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young | 個人首頁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --主色調: #00d4ff;
            --背景深: #050b18;
            --卡片背景: rgba(15, 23, 42, 0.9);
            --文字主色: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--背景深);
            color: var(--文字主色);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--卡片背景);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h2 { color: var(--主色調); margin-bottom: 20px; font-size: 2rem; }
        p { margin-bottom: 30px; opacity: 0.8; }

        /* 圖標排版 */
        .social-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            transition: 0.3s;
        }

        /* 黑白切換特效 */
        .social-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-5px);
        }

        @media (max-width: 480px) {
            .social-btn { width: 45px; height: 45px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>連結未來</h2>
        <p>技術的探索不應止步於此</p>
        
        <div class="social-grid">
            <a href="https://www.instagram.com/2010.young/" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="mailto:young@mvo.org.tw" class="social-btn"><i class="fas fa-envelope"></i></a>
            <a href="https://www.facebook.com/profile.php?id=100072979261073" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@2010young" target="_blank" class="social-btn"><i class="fab fa-youtube"></i></a>
            <a href="https://www.threads.net/@2010.young" target="_blank" class="social-btn"><i class="fab fa-threads"></i></a>
            <a href="https://x.com/2010young" target="_blank" class="social-btn"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.tiktok.com/@2010young" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/qr/G7Y6D6ALV5O4O1" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://discord.com/users/928643883652612147" target="_blank" class="social-btn"><i class="fab fa-discord"></i></a>
            <a href="https://www.twitch.tv/2010young" target="_blank" class="social-btn"><i class="fab fa-twitch"></i></a>
            <a href="https://t.me/young2010" target="_blank" class="social-btn"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://github.com/2010young" target="_blank" class="social-btn"><i class="fab fa-github"></i></a>
        </div>
    </div>

</body>
</html>
